<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Suivi des achats · Chantier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#f0ede8;--surface:#faf8f5;--border:#ddd9d1;
  --accent:#c4622d;--accent2:#2d6c4a;
  --text:#1a1714;--muted:#7a7470;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
header{background:var(--text);color:#faf8f5;padding:14px 28px;display:flex;align-items:baseline;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
header h1{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:300;color:#faf8f5}
header .sync-info{font-size:.62rem;color:#888;letter-spacing:.08em;margin-left:auto}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 49px)}

/* Sidebar */
.sidebar{width:130px;background:var(--text);padding:20px 0;display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.sidebar button{background:none;border:none;color:#888;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;padding:11px 18px;cursor:pointer;text-align:left;transition:all .15s;border-left:2px solid transparent}
.sidebar button:hover{color:#faf8f5}
.sidebar button.active{color:#faf8f5;border-left-color:var(--accent);background:rgba(255,255,255,.06)}

main{flex:1;padding:24px 28px;overflow-x:auto}
.tab{display:none}.tab.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px 18px;margin-bottom:14px}
.card-label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* Form */
.form-row{display:flex;flex-wrap:wrap;gap:7px;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

input,select{font-family:'DM Mono',monospace;font-size:.78rem;padding:6px 9px;border:1px solid var(--border);border-radius:3px;background:white;color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--accent)}
input.w80{width:80px}input.w110{width:110px}input.w140{width:140px}input.w200{width:200px}

.btn{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.04em;padding:6px 13px;border:1px solid var(--text);border-radius:3px;background:var(--text);color:#faf8f5;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:#333}
.btn.sec{background:white;color:var(--text);border-color:var(--border)}.btn.sec:hover{border-color:var(--text)}
.btn.danger{background:#b03a2e;border-color:#b03a2e}.btn.danger:hover{background:#922b21}
.btn.sm{padding:3px 8px;font-size:.65rem}

/* Filters */
.chip{font-family:'DM Mono',monospace;font-size:.67rem;padding:3px 9px;border:1px solid var(--border);border-radius:2px;background:white;color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--text);color:var(--text)}
.chip.on{background:var(--text);color:white;border-color:var(--text)}
.chips-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}

/* Total */
.total-amount{font-family:'Fraunces',serif;font-size:2rem;font-weight:700;color:var(--accent);letter-spacing:-1px}
.total-sub{font-size:.62rem;color:var(--muted);margin-top:2px}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse;background:white;font-size:.77rem}
thead tr{background:#f5f3f0}
th{padding:9px 11px;text-align:left;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;cursor:pointer;white-space:nowrap;user-select:none;border-bottom:1px solid var(--border)}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
td{padding:8px 11px;border-bottom:1px solid #f0ede8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf8f5}
td input,td select{width:100%;margin:0}

.badge{display:inline-block;border-radius:2px;font-size:.62rem;padding:2px 6px;letter-spacing:.04em}
.badge-ref{background:#eef4f1;color:var(--accent2);border:1px solid #c8ddd3}
.badge-type{background:#f0eee8;color:#7a6a50;border:1px solid #ddd9d1}
.badge-sig{background:#eef0f8;color:#3a4a7a;border:1px solid #c8cfe0}
.cell-amount{font-weight:500;color:var(--accent)}
.cell-muted{color:var(--muted)}

/* Pagination */
.pager{display:flex;gap:3px;align-items:center;margin-top:12px;flex-wrap:wrap}
.pager button{font-family:'DM Mono',monospace;font-size:.67rem;padding:4px 9px;border:1px solid var(--border);border-radius:2px;background:white;cursor:pointer;transition:all .15s}
.pager button:hover{border-color:var(--text)}
.pager button.cur{background:var(--text);color:white;border-color:var(--text)}
.pager .info{font-size:.67rem;color:var(--muted);margin:0 5px}

/* Chart */
.chart-wrap{position:relative;height:220px}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat-box{background:#f5f3f0;border-radius:4px;padding:14px 16px}
.stat-box .val{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:var(--text);margin-top:4px}
.stat-box .lbl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.bar-row{margin-bottom:9px}
.bar-row .bar-label{display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:3px}
.bar-bg{height:5px;background:#e8e4de;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}

/* Notif */
.notif{position:fixed;bottom:22px;right:22px;background:var(--text);color:white;font-family:'DM Mono',monospace;font-size:.72rem;padding:9px 16px;border-radius:4px;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:999}
.notif.show{opacity:1;transform:translateY(0)}

.empty{padding:36px;text-align:center;color:var(--muted);font-size:.78rem}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>

<header>
  <h1>Suivi des achats · Chantier</h1>
  <span class="sync-info" id="syncInfo">Chargement…</span>
</header>

<div class="layout">
  <div class="sidebar">
    <button class="active" onclick="showTab('achats',this)">Achats</button>
    <button onclick="showTab('refs',this)">Références</button>
    <button onclick="showTab('stats',this)">Stats</button>
  </div>

  <main>

    <!-- ===== ACHATS ===== -->
    <div id="achats" class="tab active">

      <div class="card">
        <div class="card-label">Nouvelle ligne</div>
        <div class="form-row">
          <div class="form-group"><label>Fournisseur *</label><input id="addF" class="w140" placeholder="ex: ALTRAD"></div>
          <div class="form-group"><label>Date * jj/mm/aaaa</label><input id="addDate" class="w110" placeholder="01/01/2025"></div>
          <div class="form-group"><label>Montant HT *</label><input id="addHt" class="w80" placeholder="0,00 €"></div>
          <div class="form-group"><label>N° pièce</label><input id="addNum" class="w110" placeholder="FAC-2025-01"></div>
          <div class="form-group"><label>Signataire</label><select id="addSig"><option value="">—</option></select></div>
          <div class="form-group"><label>Type doc</label><select id="addType"><option value="">—</option></select></div>
          <div class="form-group"><label>Réf gestion</label><select id="addRefSelect"><option value="Sans référence">—</option></select></div>
          <div class="form-group"><label>Commentaire</label><input id="addCom" class="w200" placeholder="Facultatif"></div>
          <div class="form-group"><label>&nbsp;</label><button class="btn" onclick="addRow()">+ Ajouter</button></div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Filtres</div>
        <div style="margin-bottom:8px"><span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:8px">Années</span><div class="chips-row" id="yearFilters" style="display:inline-flex"></div></div>
        <div style="margin-bottom:8px"><span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:8px">Mois</span><div class="chips-row" id="monthFilters" style="display:inline-flex"></div></div>
        <div style="margin-bottom:8px"><span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:8px">Signataire</span><div class="chips-row" id="sigFilters" style="display:inline-flex"></div></div>
        <div style="margin-bottom:8px"><span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:8px">Type</span><div class="chips-row" id="typeFilters" style="display:inline-flex"></div></div>
        <div style="margin-top:8px"><button class="btn sec sm" onclick="clearFilters()">✕ Réinitialiser</button></div>
      </div>

      <div class="topbar">
        <div style="display:flex;gap:10px;align-items:stretch;flex-wrap:wrap">
          <div class="card" style="margin:0;padding:12px 16px">
            <div style="display:flex;align-items:baseline;gap:8px">
              <span class="total-amount" id="total">—</span>
              <span style="font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">total HT</span>
            </div>
            <div class="total-sub" id="totalCount"></div>
          </div>
        </div>
        <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
          <input id="searchInput" class="w200" placeholder="🔍 Rechercher…" oninput="curPage=1;render()">
          <select id="pageSizeSel" onchange="setPageSize()" style="width:65px">
            <option>10</option><option>50</option><option>100</option>
          </select>
          <button class="btn sec sm" onclick="exportCSV()">↓ Export CSV</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Dépenses par mois / référence</div>
        <div class="chart-wrap"><canvas id="chartEl"></canvas></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr>
            <th onclick="setSort(0)" id="th0">Fournisseur</th>
            <th onclick="setSort(1)" id="th1">Date ↓</th>
            <th onclick="setSort(2)" id="th2">Commentaire</th>
            <th onclick="setSort(3)" id="th3">Montant HT</th>
            <th onclick="setSort(4)" id="th4">N° pièce</th>
            <th onclick="setSort(5)" id="th5">Signataire</th>
            <th onclick="setSort(6)" id="th6">Type</th>
            <th onclick="setSort(7)" id="th7">Réf</th>
            <th></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="emptyMsg" style="display:none">Aucune ligne ne correspond aux filtres.</div>
      <div class="pager" id="pager"></div>

    </div>

    <!-- ===== REFS ===== -->
    <div id="refs" class="tab">
      <div class="card">
        <div class="card-label">Ajouter une référence</div>
        <div class="form-row">
          <div class="form-group"><label>Code *</label><input id="newRefCode" class="w80" placeholder="ex: S1A"></div>
          <div class="form-group"><label>Désignation</label><input id="newRefName" class="w200" placeholder="ex: Structure - Lot A"></div>
          <div class="form-group"><label>&nbsp;</label><button class="btn" onclick="addReference()">+ Ajouter</button></div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Code</th><th>Désignation</th><th>Total HT</th><th>Nb lignes</th><th></th></tr></thead>
          <tbody id="refBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ===== STATS ===== -->
    <div id="stats" class="tab">
      <div id="statsContent"></div>
    </div>

  </main>
</div>

<div class="notif" id="notif"></div>

<script>
/* ---- utils ---- */
const eur=v=>{
  if(v==null) return 0
  const s=v.toString().replace(/\s/g,"").replace(/[^\d,.-]/g,"").replace(",",".")
  return parseFloat(s)||0
}
const cleanRef=v=>(v||"").trim()||"Sans référence"
const cleanType=v=>{
  const t=(v||"").trim().toLowerCase()
  if(t==="facture"||t==="facture "||t==="facture 70%"||t==="facture 80%") return "Facture"
  if(t==="devis"||t==="devis "||t==="devis étude") return "Devis"
  if(t==="prélèvement") return "Prélèvement"
  if(t==="virement") return "Virement"
  return (v||"").trim()
}

function notify(msg){
  const n=document.getElementById("notif")
  n.textContent=msg;n.classList.add("show")
  setTimeout(()=>n.classList.remove("show"),2200)
}
function parseDate(d){
  if(!d||!d.includes("/")) return {}
  const [j,m,a]=d.split("/")
  return {j:+j,m:+m,a:+a}
}
function monthKey(d){const p=parseDate(d);return p.a?p.a+"-"+String(p.m).padStart(2,"0"):null}
function dateVal(d){const p=parseDate(d);return p.a?new Date(p.a,p.m-1,p.j).getTime():0}

/* ---- tabs ---- */
function showTab(id,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"))
  document.getElementById(id).classList.add("active")
  if(btn) btn.classList.add("active")
  if(id==="stats") buildStats()
}

/* ---- refs ---- */
const REF_KEY="refs_v7"
let REFS=JSON.parse(localStorage.getItem(REF_KEY)||"{}")
function saveRefs(){localStorage.setItem(REF_KEY,JSON.stringify(REFS))}
function ensureRef(c){if(c&&c!=="Sans référence"&&REFS[c]===undefined) REFS[c]=""}

function refreshRefUI(){
  const totaux={},counts={}
  DATA.forEach(r=>{
    totaux[r.ref]=(totaux[r.ref]||0)+eur(r.arr[3])
    counts[r.ref]=(counts[r.ref]||0)+1
  })
  document.getElementById("refBody").innerHTML=Object.entries(REFS).map(([c,n])=>`
    <tr>
      <td contenteditable onblur="editRefCode('${c}',this.innerText)">${c}</td>
      <td contenteditable onblur="editRefName('${c}',this.innerText)">${n}</td>
      <td class="cell-amount">${(totaux[c]||0).toLocaleString("fr-FR",{minimumFractionDigits:2})} €</td>
      <td class="cell-muted">${counts[c]||0}</td>
      <td><button class="btn danger sm" onclick="deleteRef('${c}')">Suppr.</button></td>
    </tr>`).join("")

  const opts=`<option value="Sans référence">— Aucune —</option>`+Object.keys(REFS).map(c=>`<option>${c}</option>`).join("")
  document.getElementById("addRefSelect").innerHTML=opts
  saveRefs()
}

function addReference(){
  const c=document.getElementById("newRefCode").value.trim()
  const n=document.getElementById("newRefName").value.trim()
  if(!c){notify("Code requis");return}
  if(REFS[c]!==undefined){notify("Code déjà existant");return}
  REFS[c]=n
  document.getElementById("newRefCode").value=""
  document.getElementById("newRefName").value=""
  refreshRefUI();notify("Référence ajoutée")
}
function editRefName(c,v){REFS[c]=v.trim();saveRefs()}
function editRefCode(oldC,newC){
  newC=newC.trim()
  if(!newC||(newC!==oldC&&REFS[newC]!==undefined)){notify("Code invalide ou doublon");refreshRefUI();return}
  REFS[newC]=REFS[oldC];delete REFS[oldC]
  DATA.forEach(r=>{if(r.ref===oldC){r.ref=newC;r.arr[7]=newC}})
  refreshRefUI();render()
}
function deleteRef(c){
  if(!confirm(`Supprimer la référence "${c}" ?`)) return
  delete REFS[c]
  DATA.forEach(r=>{if(r.ref===c){r.ref="Sans référence";r.arr[7]=r.ref}})
  refreshRefUI();render();notify("Référence supprimée")
}

/* ---- data ---- */
// arr = [fournisseur, date, commentaire, montant, num_piece, signataire, type_doc, ref]
let DATA=[]
let chartInst

// Listes de valeurs uniques pour filtres/selects
let ALL_SIGS=[], ALL_TYPES=[]

/* ---- filters ---- */
const MONTHS=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"]
let selYears=new Set(),selMonths=new Set(),selSigs=new Set(),selTypes=new Set()

function toggle(set,val){set.has(val)?set.delete(val):set.add(val)}
function toggleYear(y){toggle(selYears,y);curPage=1;render();renderFilterBtns()}
function toggleMonth(m){toggle(selMonths,m);curPage=1;render();renderFilterBtns()}
function toggleSig(s){toggle(selSigs,s);curPage=1;render();renderFilterBtns()}
function toggleType(t){toggle(selTypes,t);curPage=1;render();renderFilterBtns()}
function clearFilters(){
  selYears.clear();selMonths.clear();selSigs.clear();selTypes.clear()
  document.getElementById("searchInput").value=""
  curPage=1;render();renderFilterBtns()
}

function chips(items,selSet,fn){
  return items.map(v=>`<button class="chip ${selSet.has(v)?"on":""}" onclick="${fn}('${v}')">${v}</button>`).join("")
}

function renderFilterBtns(){
  const ys=[...new Set(DATA.map(x=>x.y).filter(Boolean))].sort()
  document.getElementById("yearFilters").innerHTML=ys.map(y=>`<button class="chip ${selYears.has(y)?"on":""}" onclick="toggleYear(${y})">${y}</button>`).join("")
  document.getElementById("monthFilters").innerHTML=MONTHS.map((n,i)=>`<button class="chip ${selMonths.has(i+1)?"on":""}" onclick="toggleMonth(${i+1})">${n}</button>`).join("")
  document.getElementById("sigFilters").innerHTML=chips(ALL_SIGS,selSigs,"toggleSig")
  document.getElementById("typeFilters").innerHTML=chips(ALL_TYPES,selTypes,"toggleType")
}

function passFilter(r){
  if(selYears.size&&!selYears.has(r.y)) return false
  if(selMonths.size&&!selMonths.has(r.m)) return false
  if(selSigs.size&&!selSigs.has(r.arr[5])) return false
  if(selTypes.size&&!selTypes.has(r.arr[6])) return false
  const q=(document.getElementById("searchInput").value||"").trim().toLowerCase()
  if(q&&!r.arr.join(" ").toLowerCase().includes(q)) return false
  return true
}

/* ---- sort ---- */
let sortCol=1,sortDir=-1
function setSort(col){
  if(col===sortCol){sortDir*=-1}else{sortCol=col;sortDir=1}
  render();updateSortUI()
}
function updateSortUI(){
  for(let i=0;i<=7;i++){
    const th=document.getElementById("th"+i)
    if(!th) continue
    const labels=["Fournisseur","Date","Commentaire","Montant HT","N° pièce","Signataire","Type","Réf"]
    th.textContent=labels[i]+(i===sortCol?(sortDir===1?" ↑":" ↓"):"")
    th.classList.toggle("sorted",i===sortCol)
  }
}

/* ---- pagination ---- */
let pageSize=10,curPage=1
function setPageSize(){pageSize=parseInt(document.getElementById("pageSizeSel").value);curPage=1;render()}

function renderPager(total){
  const pages=Math.ceil(total/pageSize)||1
  let h=""
  if(pages>1){
    if(curPage>1) h+=`<button onclick="curPage=${curPage-1};render()">‹</button>`
    const s=Math.max(1,curPage-2),e=Math.min(pages,curPage+2)
    if(s>1) h+=`<button onclick="curPage=1;render()">1</button>${s>2?'<span class="info">…</span>':""}`
    for(let i=s;i<=e;i++) h+=`<button class="${i===curPage?"cur":""}" onclick="curPage=${i};render()">${i}</button>`
    if(e<pages) h+=`${e<pages-1?'<span class="info">…</span>':""}<button onclick="curPage=${pages};render()">${pages}</button>`
    if(curPage<pages) h+=`<button onclick="curPage=${curPage+1};render()">›</button>`
  }
  h+=`<span class="info">${total} ligne${total>1?"s":""}</span>`
  document.getElementById("pager").innerHTML=h
}

/* ---- add row ---- */
function addRow(){
  const f=document.getElementById("addF").value.trim()
  const d=document.getElementById("addDate").value.trim()
  const ht=document.getElementById("addHt").value.trim()
  const num=document.getElementById("addNum").value.trim()
  const sig=document.getElementById("addSig").value
  const type=cleanType(document.getElementById("addType").value)
  const ref=document.getElementById("addRefSelect").value||"Sans référence"
  const com=document.getElementById("addCom").value.trim()
  if(!f||!d||!ht){notify("Fournisseur, date et montant requis");return}
  const p=parseDate(d)
  if(!p.a){notify("Format date invalide (jj/mm/aaaa)");return}
  DATA.push({arr:[f,d,com,ht,num,sig,type,ref],ref,month:monthKey(d),y:p.a,m:p.m})
  ;["addF","addDate","addHt","addNum","addCom"].forEach(id=>document.getElementById(id).value="")
  render();renderFilterBtns();notify("Ligne ajoutée")
}

/* ---- edit/save/delete ---- */
let displayedIdx=[]

function editRow(dataIdx){
  const dispIdx=displayedIdx.indexOf(dataIdx)
  if(dispIdx<0) return
  const r=DATA[dataIdx]
  const tbody=document.getElementById("tbody")
  const tr=tbody.children[dispIdx]
  if(!tr) return
  tr.innerHTML=`
    <td><input value="${r.arr[0]}" style="width:120px"></td>
    <td><input value="${r.arr[1]}" style="width:100px"></td>
    <td><input value="${r.arr[2]||""}" style="width:160px"></td>
    <td><input value="${r.arr[3]}" style="width:90px"></td>
    <td><input value="${r.arr[4]||""}" style="width:110px"></td>
    <td><select style="width:80px">${ALL_SIGS.map(s=>`<option ${s===r.arr[5]?"selected":""}>${s}</option>`).join("")}</select></td>
    <td><select style="width:100px">${ALL_TYPES.map(t=>`<option ${t===r.arr[6]?"selected":""}>${t}</option>`).join("")}</select></td>
    <td>${refSel(r.arr[7])}</td>
    <td style="white-space:nowrap">
      <button class="btn sm" onclick="saveRow(${dataIdx})">💾</button>
      <button class="btn sec sm" onclick="render()">✕</button>
    </td>`
}

function refSel(sel){
  return `<select style="width:80px"><option value="Sans référence">— Aucune —</option>${
    Object.keys(REFS).map(k=>`<option ${k===sel?"selected":""}>${k}</option>`).join("")
  }</select>`
}

function saveRow(dataIdx){
  const dispIdx=displayedIdx.indexOf(dataIdx)
  const tr=document.getElementById("tbody").children[dispIdx]
  if(!tr) return
  const inputs=[...tr.querySelectorAll("input,select")]
  const a=inputs.map(x=>x.value)
  const p=parseDate(a[1])
  DATA[dataIdx]={arr:a,ref:a[7],month:monthKey(a[1]),y:p.a,m:p.m}
  render();notify("Ligne modifiée")
}

function deleteRow(dataIdx){
  if(!confirm("Supprimer cette ligne ?")) return
  DATA.splice(dataIdx,1)
  render();notify("Ligne supprimée")
}

/* ---- render ---- */
function render(){
  const indexed=DATA.map((r,i)=>({r,i})).filter(({r})=>passFilter(r))

  indexed.sort((a,b)=>{
    const ra=a.r,rb=b.r
    let pri
    if(sortCol===3) pri=(eur(ra.arr[3])-eur(rb.arr[3]))*sortDir
    else if(sortCol===1) pri=(dateVal(ra.arr[1])-dateVal(rb.arr[1]))*sortDir
    else pri=(ra.arr[sortCol]||"").localeCompare(rb.arr[sortCol]||"","fr")*sortDir
    return pri||(dateVal(rb.arr[1])-dateVal(ra.arr[1]))
  })

  const total=indexed.reduce((s,{r})=>s+eur(r.arr[3]),0)
  document.getElementById("total").textContent=total.toLocaleString("fr-FR",{minimumFractionDigits:2})+" €"
  document.getElementById("totalCount").textContent=`${indexed.length} achat${indexed.length>1?"s":""}`

  renderPager(indexed.length)
  const start=(curPage-1)*pageSize
  const page=indexed.slice(start,start+pageSize)
  displayedIdx=page.map(({i})=>i)

  const tbody=document.getElementById("tbody")
  const emptyMsg=document.getElementById("emptyMsg")
  if(page.length===0){tbody.innerHTML="";emptyMsg.style.display="block";buildChart([]);return}
  emptyMsg.style.display="none"

  tbody.innerHTML=page.map(({r,i})=>`<tr>
    <td>${r.arr[0]||""}</td>
    <td>${r.arr[1]||""}</td>
    <td class="cell-muted">${r.arr[2]||""}</td>
    <td class="cell-amount">${eur(r.arr[3]).toLocaleString("fr-FR",{minimumFractionDigits:2})} €</td>
    <td class="cell-muted">${r.arr[4]||""}</td>
    <td><span class="badge badge-sig">${r.arr[5]||""}</span></td>
    <td><span class="badge badge-type">${r.arr[6]||""}</span></td>
    <td><span class="badge badge-ref">${r.arr[7]||"—"}</span></td>
    <td style="white-space:nowrap">
      <button class="btn sec sm" onclick="editRow(${i})">✏️</button>
      <button class="btn danger sm" onclick="deleteRow(${i})">🗑</button>
    </td></tr>`).join("")

  buildChart(indexed.map(({r})=>r))
}

/* ---- chart ---- */
const PALETTE=["#c4622d","#2d6c4a","#2d4a6c","#9b4dca","#c4a62d","#6c2d4a","#4a6c2d","#2d6c6c","#8c4a2d","#3a7a6c"]

function buildChart(rows){
  const map={}
  rows.forEach(r=>{
    if(!r.month) return
    if(!map[r.month]) map[r.month]={}
    map[r.month][r.ref]=(map[r.month][r.ref]||0)+eur(r.arr[3])
  })
  const months=Object.keys(map).sort()
  const refs=[...new Set(rows.map(r=>r.ref))]
  const datasets=refs.map((ref,i)=>({
    label:ref,data:months.map(m=>map[m]?.[ref]||0),
    backgroundColor:PALETTE[i%PALETTE.length]+"bb",
    borderColor:PALETTE[i%PALETTE.length],
    borderWidth:1,borderRadius:2
  }))
  const ctx=document.getElementById("chartEl")
  if(chartInst) chartInst.destroy()
  chartInst=new Chart(ctx,{
    type:"bar",
    data:{labels:months,datasets},
    options:{
      animation:false,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:"DM Mono",size:11},color:"#7a7470"}}},
      scales:{
        x:{stacked:true,ticks:{font:{family:"DM Mono",size:10},color:"#7a7470"},grid:{color:"#f0ede8"}},
        y:{stacked:true,ticks:{font:{family:"DM Mono",size:10},color:"#7a7470"},grid:{color:"#ede9e2"}}
      }
    }
  })
}

/* ---- stats ---- */
function buildStats(){
  const el=document.getElementById("statsContent")
  if(!DATA.length){el.innerHTML='<div class="card empty">Aucune donnée.</div>';return}

  const total=DATA.reduce((s,r)=>s+eur(r.arr[3]),0)
  const byF={},byR={},bySig={},byYear={}
  DATA.forEach(r=>{
    const v=eur(r.arr[3])
    byF[r.arr[0]]=(byF[r.arr[0]]||0)+v
    byR[r.ref]=(byR[r.ref]||0)+v
    if(r.arr[5]) bySig[r.arr[5]]=(bySig[r.arr[5]]||0)+v
    if(r.y) byYear[r.y]=(byYear[r.y]||0)+v
  })

  const topF=Object.entries(byF).sort((a,b)=>b[1]-a[1]).slice(0,10)
  const topR=Object.entries(byR).sort((a,b)=>b[1]-a[1])
  const topSig=Object.entries(bySig).sort((a,b)=>b[1]-a[1])
  const topYear=Object.entries(byYear).sort((a,b)=>a[0]-b[0])

  const barHTML=(entries,color)=>entries.map(([label,val])=>`
    <div class="bar-row">
      <div class="bar-label"><span>${label}</span><span style="color:var(--muted)">${val.toLocaleString("fr-FR",{minimumFractionDigits:0})} €</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(val/entries[0][1]*100)}%;background:${color}"></div></div>
    </div>`).join("")

  el.innerHTML=`
    <div class="stat-grid" style="margin-bottom:14px">
      ${statBox("Total HT",total.toLocaleString("fr-FR",{minimumFractionDigits:2})+" €")}
      ${statBox("Nb achats",DATA.length+" lignes")}
      ${statBox("Fournisseurs",Object.keys(byF).length+" distincts")}
      ${statBox("Moy. / achat",(total/DATA.length).toLocaleString("fr-FR",{minimumFractionDigits:0})+" €")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card"><div class="card-label">Top fournisseurs</div>${barHTML(topF,"var(--accent)")}</div>
      <div class="card"><div class="card-label">Par référence gestion</div>${barHTML(topR,"var(--accent2)")}</div>
      <div class="card"><div class="card-label">Par signataire</div>${barHTML(topSig,"#6c3d9b")}</div>
      <div class="card"><div class="card-label">Par année</div>${barHTML(topYear,"#2d5a8c")}</div>
    </div>`
}
function statBox(lbl,val){return`<div class="stat-box"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`}

/* ---- export ---- */
function exportCSV(){
  const h=["Fournisseur","Date","Commentaire","Montant HT","N° pièce","Signataire","Type doc","Réf gestion"]
  const rows=DATA.map(r=>r.arr.map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","))
  const csv=[h.join(","),...rows].join("\n")
  const a=document.createElement("a")
  a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv)
  a.download="achats_export.csv";a.click()
  notify("Export téléchargé")
}

/* ---- load CSV ---- */
document.getElementById("syncInfo").textContent="Chargement du CSV…"
fetch("data.csv")
.then(r=>{if(!r.ok)throw new Error();return r.text()})
.then(csv=>Papa.parse(csv,{
  skipEmptyLines:true,
  complete:res=>{
    res.data.slice(1).forEach(row=>{
      if(!row[0]||row[0].startsWith("NOM")) return
      const ref=cleanRef(row[7])
      ensureRef(ref)
      const type=cleanType(row[6])
      const p=parseDate(row[1])
      DATA.push({
        // arr = [fournisseur, date, commentaire, montant, num_piece, signataire, type_doc, ref]
        arr:[row[0],row[1],row[2],row[3],row[4],row[5]||"",type,ref],
        ref,month:monthKey(row[1]),y:p.a,m:p.m
      })
    })

    // Compute unique lists
    ALL_SIGS=[...new Set(DATA.map(r=>r.arr[5]).filter(Boolean))].sort()
    ALL_TYPES=[...new Set(DATA.map(r=>r.arr[6]).filter(Boolean))].sort()

    // Populate add form selects
    document.getElementById("addSig").innerHTML=`<option value="">—</option>`+ALL_SIGS.map(s=>`<option>${s}</option>`).join("")
    document.getElementById("addType").innerHTML=`<option value="">—</option>`+ALL_TYPES.map(t=>`<option>${t}</option>`).join("")

    refreshRefUI();renderFilterBtns();updateSortUI();render()
    document.getElementById("syncInfo").textContent=`${DATA.length} lignes · sync auto toutes les 30 min`
  }
}))
.catch(()=>{
  document.getElementById("syncInfo").textContent="CSV non disponible"
  refreshRefUI();renderFilterBtns();updateSortUI();render()
})
</script>
</body>
